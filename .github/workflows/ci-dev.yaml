name: CI - Branche Dev

on:
  push:
    branches:
      - dev

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  build:
    name: Build Image Docker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4.2.2

      - name: Login sur Docker Hub
        uses: docker/login-action@v3.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build de l'image Docker
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/intranet-newdeal:latest .
          docker save ${{ secrets.DOCKERHUB_USERNAME }}/intranet-newdeal:latest -o image.tar

      - name: Sauvegarder l'image en artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar
          retention-days: 1

  scan:
    name: Scan Sécurité
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4.2.2

      - name: Télécharger l'image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Charger l'image Docker
        run: docker load -i image.tar

      - name: Scan Trivy - vulnérabilités
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/intranet-newdeal:latest
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true

      - name: Scan Trivy - secrets dans le code
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret
          exit-code: '1'

  push:
    name: Push vers Docker Hub
    runs-on: ubuntu-latest
    needs: scan

    steps:
      - name: Télécharger l'image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Charger l'image Docker
        run: docker load -i image.tar

      - name: Login sur Docker Hub
        uses: docker/login-action@v3.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push de l'image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/intranet-newdeal:latest

  notify:
    name: Notification Email
    runs-on: ubuntu-latest
    needs: [build, scan, push]
    if: always()

    steps:
      - name: Envoyer notification
        uses: dawidd6/action-send-mail@v3.12.0
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "[CI Dev] Pipeline intranet-newdeal - ${{ job.status }}"
          to: ${{ secrets.EMAIL_USERNAME }}
          from: GitHub Actions <${{ secrets.EMAIL_USERNAME }}>
          body: |
            Pipeline CI - Branche dev

            Statut        : ${{ job.status }}
            Repository    : ${{ github.repository }}
            Branche       : ${{ github.ref_name }}
            Commit        : ${{ github.sha }}
            Déclenché par : ${{ github.actor }}

            - Build Image Docker : ${{ needs.build.result }}
            - Scan Sécurité      : ${{ needs.scan.result }}
            - Push Docker Hub    : ${{ needs.push.result }}

            Détail : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
