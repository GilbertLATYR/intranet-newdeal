name: CD - Branche Prod

on:
  push:
    branches:
      - prod

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  scan:
    name: Scan Sécurité
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4.2.2

      - name: Scan Trivy - vulnérabilités sur le code
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL
          exit-code: '0'

      - name: Scan Trivy - secrets dans le code
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret
          exit-code: '0'

  deploy:
    name: Déploiement Production
    runs-on: [self-hosted, runner_prod]
    needs: scan

    steps:
      - name: Login sur Docker Hub
        uses: docker/login-action@v3.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull de la nouvelle image
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/intranet-newdeal:latest

      - name: Arrêter le conteneur existant
        run: |
          docker stop intranet-newdeal || true
          docker rm intranet-newdeal || true

      - name: Lancer le conteneur sur port 80
        run: |
          docker run -d \
            --name intranet-newdeal \
            --restart always \
            -p 80:80 \
            ${{ secrets.DOCKERHUB_USERNAME }}/intranet-newdeal:latest

      - name: Vérification santé
        run: |
          sleep 5
          docker ps | grep intranet-newdeal

  notify:
    name: Notification Email
    runs-on: ubuntu-latest
    needs: [scan, deploy]
    if: always()

    steps:
      - name: Envoyer notification
        uses: dawidd6/action-send-mail@v3.12.0
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "[CD Prod] Déploiement intranet-newdeal - ${{ job.status }}"
          to: ${{ secrets.EMAIL_USERNAME }}
          from: GitHub Actions <${{ secrets.EMAIL_USERNAME }}>
          body: |
            Pipeline CD - Branche prod

            Statut        : ${{ job.status }}
            Repository    : ${{ github.repository }}
            Branche       : ${{ github.ref_name }}
            Commit        : ${{ github.sha }}
            Déclenché par : ${{ github.actor }}

            - Scan Sécurité : ${{ needs.scan.result }}
            - Déploiement   : ${{ needs.deploy.result }}

            Détail : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
